plugins {
    id "com.gtnewhorizons.retrofuturagradle" version "1.3.+"
    id "java"
    id "maven-publish"
}

group = "com.bqmcp"
version = "1.0.0"

base {
    archivesName = "bq-mcp-bridge"
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(8)
    }
}

minecraft {
    mcVersion = "1.12.2"
    mcpMappingChannel = "stable"
    mcpMappingVersion = "39"
}

repositories {
    mavenCentral()
    maven {
        name = "GTNH Maven"
        url = "https://nexus.gtnewhorizons.com/repository/public/"
    }
    flatDir {
        dirs "libs"
    }
}

dependencies {
    implementation files("libs/BetterQuestingUnofficial-4.3.2.jar")
    testImplementation "junit:junit:4.13.2"
}

test {
    useJUnit()
    testLogging {
        events "passed", "skipped", "failed"
        showStandardStreams = false
    }
}

processResources {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    inputs.property("version", project.version)
    from(sourceSets.main.resources.srcDirs) {
        include "mcmod.info"
        expand "version": project.version, "mcversion": project.minecraft.mcVersion
    }
}
